<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>WebGIS Jumlah Penduduk Surabaya</title>

  <!-- MapLibre GL JS: library utama untuk menampilkan peta web -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <!-- CSS buatan sendiri -->
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body>
  <!-- Header aplikasi -->
  <header class="app-header">
    <div class="brand">
      <div class="logo">S</div>
      <div>
        <h1>WebGIS Surabaya</h1>
        <p>www.surabaya.go.id</p>
      </div>
    </div>
  </header>

  <!-- Layout utama: sidebar + peta -->
  <main class="app-layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>Kontrol Peta</h2>
        <p class="helper-text" style="margin-top: 8px; font-style: italic;">
  *klik pada salah satu wilayah di peta untuk melihat detail jumlah penduduk.
</p>
        </p>

        <label for="kecamatanSelect">Filter Kecamatan</label>
        <select id="kecamatanSelect">
          <option value="all">Semua Kecamatan</option>
        </select>

        <button id="resetFilterBtn">Reset Filter</button>
      </section>

      <section class="panel">
        <h2>Legenda</h2>
        <div class="legend-item"><span style="background:#fff7bc"></span> &lt; 15.000 jiwa</div>
<div class="legend-item"><span style="background:#fec44f"></span> 15.000 - 30.000 jiwa</div>
<div class="legend-item"><span style="background:#d95f0e"></span> 30.000 - 50.000 jiwa</div>
<div class="legend-item"><span style="background:#7f2704"></span> &gt; 50.000 jiwa</div>
      </section>
    </aside>

    <section class="map-container">
      <div id="map"></div>
    </section>
  </main>

  <!-- JavaScript aplikasi -->
  <script src="./js/app.js"></script>
</body>
</html>
